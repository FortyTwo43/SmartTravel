<!-- WCAG 4.1.3 — Región aria-live global para mensajes de estado (toasts, alertas asíncronas).
     Se encuentra aquí, en app-root, para no duplicarse en ninguna subruta.
     Los servicios de notificación inyectan contenido aquí vía documento o servicio compartido. -->
<div
  id="global-status-region"
  aria-live="polite"
  aria-atomic="true"
  aria-relevant="additions text"
  class="sr-only"
  role="status"
></div>
