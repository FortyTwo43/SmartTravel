<div class="activity-card">
  <div class="activity-header">
    <h4 class="activity-title">Actividad Reciente</h4>
    <button class="btn-link">Ver todo</button>
  </div>
  <div class="table-container">
    <table class="activity-table">
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Servicio</th>
          <th>Pax</th>
          <th>Estado</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of activities">
          <td class="client-cell">
            <div class="avatar" [ngClass]="item.colorClass">{{item.initials}}</div>
            <span>{{item.name}}</span>
          </td>
          <td class="text-muted">{{item.service}}</td>
          <td>{{item.pax}}</td>
          <td>
            <span class="status-pill" [ngClass]="{
              'status-green': item.status === 'Confirmada' || item.status === 'Completada',
              'status-amber': item.status === 'Pendiente'
            }">{{item.status}}</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
