<section class="hero-section">
  <div class="hero-background">
    <div class="hero-gradient"></div>
  </div>
  <div class="hero-content">
    <h1 class="hero-title">{{ 'HOME.HERO.TITLE' | translate }}</h1>
    <p class="hero-subtitle">{{ 'HOME.HERO.SUBTITLE' | translate }}</p>
    <div class="hero-actions">
      <button class="btn btn-primary btn-lg">
        {{ 'HOME.HERO.PLAN_TRIP' | translate }}
        <!-- Include lucide icon here if needed, but per rules, Lucide must be imported -->
      </button>
      <button class="btn btn-outlined btn-lg">
        {{ 'HOME.HERO.PROVIDER' | translate }}
      </button>
    </div>
    
    <div class="hero-video-card group">
      <div class="video-overlay"></div>
      <div class="video-content">
        <div class="play-btn">
          <!-- Play icon or similar -->
        </div>
        <p class="video-text">{{ 'HOME.HERO.INTRO_VIDEO' | translate }}</p>
      </div>
      <!-- Empty space for video embed or background image -->
    </div>
  </div>
</section>
