<div class="input-container">
  @if (label()) {
    <label [for]="id()">{{ label() }}</label>
  }
  
  <div class="input-wrapper" [class.has-icon]="icon()">
    @if (icon()) {
      <lucide-icon [name]="icon()!" class="prefix-icon"></lucide-icon>
    }
    
    <input 
      [id]="id()"
      [type]="currentType()" 
      [placeholder]="placeholder()"
      [value]="value()"
      [disabled]="disabled()"
      (input)="handleInput($event)"
      (blur)="onTouched()"
      class="input-field"
    />

    @if (type() === 'password') {
      <button type="button" class="toggle-password" (click)="togglePassword()">
        <lucide-icon [name]="showPassword() ? 'eye-off' : 'eye'"></lucide-icon>
      </button>
    }
  </div>
</div>
