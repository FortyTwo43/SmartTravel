<div class="metric-card">
  <p class="metric-label">{{label}}</p>
  <div class="metric-value-container">
    <h3 class="metric-value" [ngClass]="valueColorClass">{{value}}</h3>
    @if (trend) {
      <span class="metric-trend" [ngClass]="trendColorClass">{{trend}}</span>
    }
    @if (icon) {
      <lucide-icon [name]="icon" class="icon-md" [ngClass]="iconColorClass"></lucide-icon>
    }
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" [ngClass]="progressColorClass" [style.width.%]="progressPercent" [style.opacity]="progressOpacity ? progressOpacity : 1"></div>
  </div>
</div>
