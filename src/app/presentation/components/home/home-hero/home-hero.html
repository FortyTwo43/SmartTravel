<section class="hero-section" aria-labelledby="hero-title">
  <div class="hero-background" aria-hidden="true">
    <div class="hero-gradient"></div>
  </div>
  <div class="hero-content">
    <h1 id="hero-title" class="hero-title">{{ 'HOME.HERO.TITLE' | translate }}</h1>
    <p class="hero-subtitle">{{ 'HOME.HERO.SUBTITLE' | translate }}</p>
    <div class="hero-actions">
      <button class="btn btn-primary btn-lg group" type="button">
        {{ 'HOME.HERO.PLAN_TRIP' | translate }}
        <lucide-icon name="arrow-right" class="hero-btn-icon group-hover:translate-x-1" aria-hidden="true"></lucide-icon>
      </button>
      <button class="btn btn-outlined btn-lg" type="button">
        {{ 'HOME.HERO.PROVIDER' | translate }}
      </button>
    </div>
    
    <div class="video-container-wrapper">
      <div class="video-section">
        <div class="video-top-controls" style="display: flex; justify-content: flex-end; margin-bottom: 0.5rem;">
          <button class="btn btn-outlined btn-sm custom-control-btn" (click)="multimediaService.togglePauseAutoAudio()" type="button" aria-label="Toggle Auto Audio">
            <lucide-icon [name]="multimediaService.pauseAutoAudio() ? 'volume-x' : 'volume-2'" aria-hidden="true"></lucide-icon>
            {{ (multimediaService.pauseAutoAudio() ? 'HOME.HERO.UNMUTE_AUDIO' : 'HOME.HERO.MUTE_AUDIO') | translate }}
          </button>
        </div>
        
        @if (multimediaService.audioDescription()) {
          <video autoplay [muted]="multimediaService.pauseAutoAudio()" controls class="hero-video" crossorigin="anonymous">
            <source src="assets/videos/registro/registroAudiodescripcion.mp4" type="video/mp4">
            @if (multimediaService.syncCaptions()) {
              <track src="assets/videos/registro/registroAudiodescripcion.vtt" kind="captions" srclang="es" label="Español" default>
            }
          </video>
        } @else {
          <video autoplay [muted]="multimediaService.pauseAutoAudio()" controls class="hero-video" crossorigin="anonymous">
            <source src="assets/videos/registro/registro.mp4" type="video/mp4">
            @if (multimediaService.syncCaptions()) {
              <track src="assets/videos/registro/registro.vtt" kind="captions" srclang="es" label="Español" default>
            }
          </video>
        }
        
        <div class="video-controls-custom">
          <button class="btn btn-outlined btn-sm custom-control-btn" (click)="toggleAudioDesc()" type="button">
            <lucide-icon name="audio-lines" aria-hidden="true"></lucide-icon>
            {{ (multimediaService.audioDescription() ? 'HOME.HERO.DISABLE_AD' : 'HOME.HERO.ENABLE_AD') | translate }}
          </button>
          <button class="btn btn-outlined btn-sm custom-control-btn" (click)="toggleTranscript()" type="button" [attr.aria-expanded]="multimediaService.textTranscripts()">
            <lucide-icon name="file-text" aria-hidden="true"></lucide-icon>
            {{ (multimediaService.textTranscripts() ? 'HOME.HERO.HIDE_TRANSCRIPT' : 'HOME.HERO.SHOW_TRANSCRIPT') | translate }}
          </button>
        </div>
      </div>
      
      @if (multimediaService.textTranscripts()) {
        <div class="transcript-panel">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 class="transcript-title">{{ 'HOME.HERO.TRANSCRIPT_TITLE' | translate }}</h3>
            @if (!isSpeaking()) {
              <button class="btn btn-sm" (click)="readTranscript()" [attr.aria-label]="'HOME.HERO.READ_TRANSCRIPT' | translate" style="background: none; border: none; cursor: pointer; color: var(--text-main);">
                <lucide-icon name="volume-2" aria-hidden="true" size="20"></lucide-icon>
              </button>
            } @else {
              <button class="btn btn-sm" (click)="stopReading()" [attr.aria-label]="'HOME.HERO.STOP_READING' | translate" style="background: none; border: none; cursor: pointer; color: var(--color-primary);">
                <lucide-icon name="volume-x" aria-hidden="true" size="20"></lucide-icon>
              </button>
            }
          </div>
          <p class="transcript-content">{{ displayedTranscript() }}</p>
          <div class="transcript-navigation" style="display: flex; justify-content: space-between; margin-top: 1rem;">
            <button class="btn btn-sm btn-outlined" (click)="prevTranscript()" [disabled]="!hasPrevTranscript()">Atrás</button>
            <button class="btn btn-sm btn-outlined" (click)="nextTranscript()" [disabled]="!hasNextTranscript()">Adelante</button>
          </div>
        </div>
      }
    </div>
  </div>
</section>
