<section class="info-section" aria-label="Información para viajeros y proveedores">
  <div class="info-container">
    <div class="info-grid">
      <!-- Traveler Card -->
      <article class="info-card group" aria-labelledby="traveler-info-title">
        <img class="info-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhzMLJsBS4IdX7Pb_oYENI68nC0qox9G_ii-qTWLxIGwMKcI6bJrBvRoSntZqNBzUns0DVUKWVoN-M4qXJH4aFK70kRvuOFqDxmR4N7O50mEnm4sfertLFiC9UNvtavCfMie98h4wYJz_GW6kFlcgDQYUn0sv5bYXch9kZL5RjxLPBVbK_EHQ1Z5I7Y-JLjh-qx_bwDE58trbn7NIFy34A_rm2U3KZ87Kf-XHIlsDQ_6vmtDyVH7k4Ne8YuF26In0CkX5OATUWTTw" [attr.alt]="'HOME.INFO.TRAVELER_IMG_ALT' | translate" />
        <div class="info-gradient"></div>
        <div class="info-content">
          <span class="info-badge badge-primary">{{ 'HOME.INFO.TRAVELER_BADGE' | translate }}</span>
          <h2 id="traveler-info-title" class="info-title">{{ 'HOME.INFO.TRAVELER_TITLE' | translate }}</h2>
          <p class="info-desc">{{ 'HOME.INFO.TRAVELER_DESC' | translate }}</p>
          <button class="info-action text-primary" type="button">
            {{ 'HOME.INFO.START_NOW' | translate }}
            <lucide-icon name="arrow-right" class="info-btn-icon" aria-hidden="true"></lucide-icon>
          </button>
        </div>
      </article>

      <!-- Provider Card -->
      <article class="info-card group" aria-labelledby="provider-info-title">
        <img class="info-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC1-uZBVZkhTUK3sClvoqFQEaDZx0H3yUBE4xxodVEV1XNhPHMgPOi_QVffXStatZRGJMoGnVcB03h9Kn9Q_hlL_h170jfGedQyX8fZAgnCpBFE_YpfhUVI0zq9y20AktSpCfKPNCT9MdelVyd7n9nahAs0pb7K_GqVTqaSXnwjMhU26wZx2dQW2JCnYPoTM5vLfrUUyaIWyNbJaQh87Bi42GnXTZjKtpaYl-qRasUJwSyCYPoZGPYzHRZzhJtlt8EQDukvBur7oeg" [attr.alt]="'HOME.INFO.PROVIDER_IMG_ALT' | translate" />
        <div class="info-gradient"></div>
        <div class="info-content">
          <span class="info-badge badge-secondary">{{ 'HOME.INFO.PROVIDER_BADGE' | translate }}</span>
          <h2 id="provider-info-title" class="info-title">{{ 'HOME.INFO.PROVIDER_TITLE' | translate }}</h2>
          <p class="info-desc">{{ 'HOME.INFO.PROVIDER_DESC' | translate }}</p>
          <button class="info-action text-secondary" type="button">
            {{ 'HOME.INFO.REGISTER_COMPANY' | translate }}
            <lucide-icon name="arrow-right" style="width: 1.25rem; height: 1.25rem;" aria-hidden="true"></lucide-icon>
          </button>
        </div>
      </article>
    </div>
  </div>
</section>
