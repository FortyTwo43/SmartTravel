<figure class="chart-container" [attr.aria-label]="title">
  @if (data && data.length > 0) {
    <div echarts [options]="chartOption" class="chart" role="img" [attr.aria-label]="title"></div>
  } @else {
    <p class="empty-state" role="status">{{ 'PROVIDER_STATISTICS.NO_DATA' | translate }}</p>
  }
</figure>
