<div class="insights-card">
  <div class="insights-header">
    <h4 class="insights-title">Insights del Cliente</h4>
    <p class="insights-subtitle">Perfil demográfico de este mes</p>
  </div>
  
  <div class="insights-section">
    <p class="section-label">Tipo de Viaje</p>
    
    @for (stat of travelStats; track stat.label) {
      <div class="travel-type-item">
        <div class="item-header">
          <span>{{stat.label}}</span>
          <span class="font-bold" [ngClass]="stat.textColorClass">{{stat.percentage}}%</span>
        </div>
        <div class="progress-bg">
          <div class="progress-fill" [ngClass]="stat.bgColorClass" [style.width.%]="stat.percentage"></div>
        </div>
      </div>
    }
  </div>
  
  <div class="insights-section">
    <p class="section-label">Intereses TOP</p>
    <div class="interests-container">
      @for (interest of interests; track interest) {
        <span class="interest-tag">
          {{interest}}
        </span>
      }
    </div>
  </div>
</div>
