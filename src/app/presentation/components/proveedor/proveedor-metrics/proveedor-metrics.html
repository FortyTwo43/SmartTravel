<div class="metrics-grid">
  @for (metric of metrics; track metric.label) {
    <app-metric-card
      [label]="metric.label"
      [value]="metric.value"
      [valueColorClass]="metric.valueColorClass || ''"
      [trend]="metric.trend"
      [trendColorClass]="metric.trendColorClass || ''"
      [progressPercent]="metric.progressPercent"
      [progressColorClass]="metric.progressColorClass"
      [progressOpacity]="metric.progressOpacity">
    </app-metric-card>
  }
</div>
