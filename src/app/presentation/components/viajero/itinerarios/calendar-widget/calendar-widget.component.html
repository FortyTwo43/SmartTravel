<div class="calendar-card">
  <div class="calendar-header">
    <h3 class="calendar-month-title">{{ month() }}</h3>
    <div class="calendar-actions">
      <button class="btn-calendar-nav">
        <lucide-icon name="chevron-left" size="20" aria-hidden="true"></lucide-icon>
      </button>
      <button class="btn-calendar-nav">
        <lucide-icon name="chevron-right" size="20" aria-hidden="true"></lucide-icon>
      </button>
    </div>
  </div>
  
  <div class="calendar-header-row">
    <div>S</div>
    <div>M</div>
    <div>T</div>
    <div>W</div>
    <div>T</div>
    <div>F</div>
    <div>S</div>
  </div>
  
  <div class="calendar-grid">
    <div class="day-prev-month">29</div>
    <div class="day-prev-month">30</div>
    <div class="day-prev-month">31</div>
    <div class="day-current">1</div>
    <div class="day-current">2</div>
    <div class="day-current">3</div>
    
    <div class="day-event">4</div>
    <div class="day-active">5</div>
    <div class="day-event">6</div>
    <div class="day-event">7</div>
    <div class="day-event">8</div>
    <div class="day-event">9</div>
    <div class="day-event">10</div>
    
    <div class="day-event">11</div>
    <div class="day-event">12</div>
    <div class="day-event">13</div>
    <div class="day-event">14</div>
    <div class="day-event">15</div>
    <div class="day-current">16</div>
    <div class="day-current">17</div>
    
    <div class="day-current">18</div>
    <div class="day-current">19</div>
    <div class="day-current">20</div>
    <div class="day-current">21</div>
    <div class="day-current">22</div>
    <div class="day-current">23</div>
    <div class="day-current">24</div>
  </div>
</div>
