@if (stats()) {
  <dl class="stats-grid">
    @for (entry of Object.entries(stats()!); track entry[0]) {
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <lucide-icon [name]="getStatIcon(entry[0])" class="icon"></lucide-icon>
        </div>
        <div class="stat-info">
          <dt class="stat-label">{{ getStatLabel(entry[0]) | translate }}</dt>
          <dd class="stat-value">{{ entry[1] }}</dd>
        </div>
      </div>
    }
  </dl>
}
