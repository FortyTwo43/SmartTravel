@if (trip()) {
  <article class="trip-card" [attr.aria-label]="trip()!.destino">
    <!-- Status header -->
    <div class="trip-content">
      <div class="trip-header">
        <div class="trip-status-top">
          <span class="airplane-icon" aria-hidden="true">✈️</span>
          <span class="status-text" [class]="trip()!.estado">
            {{ 'TRIP_CARD.STATUS.' + trip()!.estado.toUpperCase() | translate }}
          </span>
        </div>
        <h3 class="trip-title">{{ trip()!.destino }}</h3>
        <p class="trip-meta">{{ trip()!.fecha_inicio }} — {{ trip()!.fecha_fin }}</p>
      </div>

      <div class="trip-footer">
        <button type="button" class="details-btn" [attr.aria-label]="('TRIP_CARD.DETAILS' | translate) + ' ' + trip()!.destino">
          {{ 'TRIP_CARD.DETAILS' | translate }}
        </button>
      </div>
    </div>
  </article>
}
