<div class="filters">
  <h2 class="filters-title">Filtros</h2>

  <fieldset class="filter-group" style="border:none; padding:0; margin:0;">
    <legend class="filter-label">Países</legend>
    <div class="exps-pills">
      <button 
        class="pill-btn" 
        [class.active]="paises().includes('Ecuador')"
        [attr.aria-pressed]="paises().includes('Ecuador')"
        (click)="togglePais('Ecuador')"
      >
        Ecuador
      </button>
      <button 
        class="pill-btn" 
        [class.active]="paises().includes('Italia')"
        [attr.aria-pressed]="paises().includes('Italia')"
        (click)="togglePais('Italia')"
      >
        Italia
      </button>
      <button 
        class="pill-btn" 
        [class.active]="paises().includes('España')"
        [attr.aria-pressed]="paises().includes('España')"
        (click)="togglePais('España')"
      >
        España
      </button>
      <button 
        class="pill-btn" 
        [class.active]="paises().includes('Japón')"
        [attr.aria-pressed]="paises().includes('Japón')"
        (click)="togglePais('Japón')"
      >
        Japón
      </button>
    </div>
    <hr class="divider" />
  </fieldset>

  <fieldset class="filter-group" style="border:none; padding:0; margin:0;">
    <legend class="filter-label">Intereses</legend>
    <div class="interests-grid">
      @for (interest of visibleIntereses(); track interest.id) {
        <button 
          class="interest-btn" 
          [class.active]="intereses().includes(interest.id)"
          [attr.aria-pressed]="intereses().includes(interest.id)"
          (click)="toggleIntereses(interest.id)"
          [attr.aria-label]="interest.label | translate"
        >
          <lucide-icon [name]="interest.icon" size="20"></lucide-icon>
          <span>{{ interest.label | translate }}</span>
        </button>
      }
    </div>
    
    @if (!isExpandedIntereses() && hiddenInteresesCount() > 0) {
      <button class="btn-view-more" (click)="toggleExpandIntereses()">
        Ver más (+{{ hiddenInteresesCount() }})
      </button>
    } @else if (isExpandedIntereses()) {
      <button class="btn-view-less" (click)="toggleExpandIntereses()">
        Ver menos
      </button>
    }
    <hr class="divider" />
  </fieldset>

  <fieldset class="filter-group" style="border:none; padding:0; margin:0;">
    <legend class="filter-label">Calificación</legend>
    <div class="rating-buttons">
      <button 
        class="rating-btn" 
        [class.active]="ratingFilter() === '4-5'"
        [attr.aria-pressed]="ratingFilter() === '4-5'"
        (click)="setRating('4-5')"
      >
        <lucide-icon name="star" size="16"></lucide-icon>
        4+ ★
      </button>
      <button 
        class="rating-btn" 
        [class.active]="ratingFilter() === '3-1'"
        [attr.aria-pressed]="ratingFilter() === '3-1'"
        (click)="setRating('3-1')"
      >
        <lucide-icon name="star" size="16"></lucide-icon>
        3- ★
      </button>
    </div>
    <hr class="divider" />
  </fieldset>

  <fieldset class="filter-group" style="border:none; padding:0; margin:0;">
    <legend class="filter-label">Experiencia</legend>
    <div class="exps-pills">
      <button 
        class="pill-btn" 
        [class.active]="experiencia() === 'relajante'"
        [attr.aria-pressed]="experiencia() === 'relajante'"
        (click)="setExperiencia('relajante')"
      >
        Relajante
      </button>
      <button 
        class="pill-btn" 
        [class.active]="experiencia() === 'aventura'"
        [attr.aria-pressed]="experiencia() === 'aventura'"
        (click)="setExperiencia('aventura')"
      >
        Aventura
      </button>
      <button 
        class="pill-btn" 
        [class.active]="experiencia() === 'familiar'"
        [attr.aria-pressed]="experiencia() === 'familiar'"
        (click)="setExperiencia('familiar')"
      >
        Familiar
      </button>
      <button 
        class="pill-btn" 
        [class.active]="experiencia() === 'lujo'"
        [attr.aria-pressed]="experiencia() === 'lujo'"
        (click)="setExperiencia('lujo')"
      >
        Lujo
      </button>
    </div>
  </fieldset>

  <button class="btn-clear-filters" (click)="clearFilters()">
    Limpiar filtros
  </button>
</div>
