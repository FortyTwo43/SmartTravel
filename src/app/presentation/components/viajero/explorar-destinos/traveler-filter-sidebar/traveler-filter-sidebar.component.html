<div class="filters">
  <h2 class="filters-title">Filtros</h2>

  <div class="filter-group">
    <label class="filter-label">Rango de precio (por noche)</label>
    <div class="price-slider">
      <div class="slider-track"></div>
      <div class="slider-thumb" style="left: 40%;"></div>
    </div>
    <div class="price-labels">
      <span>$0</span>
      <span>$1,000+</span>
    </div>
    <hr class="divider" />
  </div>

  <div class="filter-group">
    <label class="filter-label">Categoría</label>
    <div class="cats-grid">
      <button class="cat-btn" (click)="toggleCategoria('playa')">
        <lucide-icon name="umbrella"></lucide-icon>
        <span>Playa</span>
      </button>
      <button class="cat-btn" (click)="toggleCategoria('montana')">
        <lucide-icon name="mountain"></lucide-icon>
        <span>Montaña</span>
      </button>
      <button class="cat-btn" (click)="toggleCategoria('ciudad')">
        <lucide-icon name="building"></lucide-icon>
        <span>Ciudad</span>
      </button>
      <button class="cat-btn" (click)="toggleCategoria('rural')">
        <lucide-icon name="home"></lucide-icon>
        <span>Rural</span>
      </button>
    </div>
    <hr class="divider" />
  </div>

  <div class="filter-group">
    <label class="filter-label">Calificación</label>
    <div class="rating-checkboxes">
      <label class="checkbox-label">
        <input type="checkbox" (change)="emitFilters()" /> 5 <span>☆</span>
      </label>
      <label class="checkbox-label">
        <input type="checkbox" (change)="emitFilters()" /> 4+ <span>☆</span>
      </label>
    </div>
    <hr class="divider" />
  </div>

  <div class="filter-group">
    <label class="filter-label">Experiencia</label>
    <div class="exps-pills">
      <button class="pill-btn" (click)="setExperiencia('relajante')">Relajante</button>
      <button class="pill-btn" (click)="setExperiencia('aventura')">Aventura</button>
      <button class="pill-btn" (click)="setExperiencia('familiar')">Familiar</button>
      <button class="pill-btn" (click)="setExperiencia('lujo')">Lujo</button>
    </div>
  </div>
</div>
