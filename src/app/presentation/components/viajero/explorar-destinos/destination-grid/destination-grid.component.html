@if (destinos() && destinos()!.length > 0) {
  <div class="results-header">
    <div class="results-count"><strong>{{ destinos()!.length }}</strong> destinos encontrados</div>
  </div>
  <div class="grid">
    @for (d of destinos()!; track d.id) {
      <app-explore-destination-card [destination]="d"></app-explore-destination-card>
    }
  </div>
} @else {
  <div class="empty">No se encontraron destinos</div>
}
