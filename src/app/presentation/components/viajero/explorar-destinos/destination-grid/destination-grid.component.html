@if (destinos() && destinos()!.length > 0) {
  <div class="results-header">
    <div class="results-count" aria-live="polite" aria-atomic="true">
      <strong>{{ destinos()!.length }}</strong> {{ 'EXPLORE.RESULTS_FOUND' | translate }}
    </div>
  </div>
  <ul class="grid" aria-label="{{ 'EXPLORE.GRID_LABEL' | translate }}">
    @for (d of destinos()!; track d.id) {
      <li>
        <app-explore-destination-card [destination]="d"></app-explore-destination-card>
      </li>
    }
  </ul>
} @else {
  <div class="empty" role="status">{{ 'EXPLORE.NO_RESULTS' | translate }}</div>
}
