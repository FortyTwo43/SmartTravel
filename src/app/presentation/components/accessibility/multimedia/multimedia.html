<section class="adjustments-section">
  <fieldset class="adjustments-fieldset">
    <legend class="section-title">
      {{ 'ACCESSIBILITY.MULTIMEDIA' | translate }}
    </legend>
    <div class="toggles-container">
      <label class="toggle-option">
        <input 
          type="checkbox" 
          class="toggle-input" 
          [checked]="multimediaService.pauseAutoAudio()"
          (change)="multimediaService.togglePauseAutoAudio()"
        />
        <div class="toggle-label-text">
          <span class="toggle-title">{{ 'ACCESSIBILITY.PAUSE_AUTO_AUDIO' | translate }}</span>
          <span class="toggle-desc">{{ 'ACCESSIBILITY.PAUSE_AUTO_AUDIO_DESC' | translate }}</span>
        </div>
      </label>
      <label class="toggle-option">
        <input type="checkbox" class="toggle-input" />
        <div class="toggle-label-text">
          <span class="toggle-title">{{ 'ACCESSIBILITY.TEXT_TRANSCRIPTS' | translate }}</span>
          <span class="toggle-desc">{{ 'ACCESSIBILITY.TEXT_TRANSCRIPTS_DESC' | translate }}</span>
        </div>
      </label>
      <label class="toggle-option">
        <input type="checkbox" class="toggle-input" />
        <div class="toggle-label-text">
          <span class="toggle-title">{{ 'ACCESSIBILITY.SYNC_CAPTIONS' | translate }}</span>
          <span class="toggle-desc">{{ 'ACCESSIBILITY.SYNC_CAPTIONS_DESC' | translate }}</span>
        </div>
      </label>
      <label class="toggle-option">
        <input type="checkbox" class="toggle-input" />
        <div class="toggle-label-text">
          <span class="toggle-title">{{ 'ACCESSIBILITY.AUDIO_DESCRIPTION' | translate }}</span>
          <span class="toggle-desc">{{ 'ACCESSIBILITY.AUDIO_DESCRIPTION_DESC' | translate }}</span>
        </div>
      </label>
      <label class="toggle-option">
        <input type="checkbox" class="toggle-input" />
        <div class="toggle-label-text">
          <span class="toggle-title">{{ 'ACCESSIBILITY.REALTIME_CAPTIONS' | translate }}</span>
          <span class="toggle-desc">{{ 'ACCESSIBILITY.REALTIME_CAPTIONS_DESC' | translate }}</span>
        </div>
      </label>
    </div>
  </fieldset>
</section>
