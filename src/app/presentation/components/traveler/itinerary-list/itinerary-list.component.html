<div class="itinerary-list">
  @if (itineraries().length > 0) {
    <ul class="list">
      @for (item of itineraries(); track item.id) {
        <li class="list-item" [class]="getStatusClass(item.status)">
          <div class="item-left">
            <div class="status-indicator" [class]="getStatusClass(item.status)"></div>
            <div class="item-info">
              <h4 class="item-title">{{ item.title }}</h4>
              <p class="item-destination">{{ item.destination }}</p>
            </div>
          </div>

          <div class="item-right">
            <div class="item-date">
              <lucide-icon name="Calendar" class="icon"></lucide-icon>
              <span>{{ item.date }}</span>
            </div>
            <span class="item-status" [class]="getStatusClass(item.status)">
              {{ 'TRAVELER_DASHBOARD.ITINERARY_' + item.status | translate }}
            </span>
          </div>
        </li>
      }
    </ul>
  } @else {
    <p class="empty-state">{{ 'TRAVELER_DASHBOARD.NO_ITINERARIES' | translate }}</p>
  }
</div>
