@if (destination()) {
  <div class="destination-card">
    <div class="destination-image-container">
      <img [src]="destination()!.image" [alt]="destination()!.name" class="destination-image" />
    </div>

    <div class="destination-content">
      <h3 class="destination-title">{{ destination()!.name }}, {{ destination()!.country }}</h3>

      <div class="destination-meta">
        <span class="destination-price">Desde {{ destination()!.estimatedBudget | currency }}</span>
        <span class="destination-rating">
          <lucide-icon name="Star" class="star-icon"></lucide-icon>
          {{ destination()!.rating }}
        </span>
      </div>
    </div>
  </div>
}
