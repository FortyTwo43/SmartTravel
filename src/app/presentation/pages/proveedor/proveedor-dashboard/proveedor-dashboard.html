<app-proveedor-layout [establecimientoNombre]="establecimiento.nombre" [establecimientoTipo]="establecimiento.tipo">
  <div class="dashboard-container">
    <!-- Section 1: Executive Metrics -->
    <app-proveedor-metrics [metrics]="metricsData()"></app-proveedor-metrics>
    
    <!-- Section 2: Visual Intelligence (Chart Placeholder) -->
    <app-proveedor-chart-placeholder></app-proveedor-chart-placeholder>
    
    <!-- Section 3: Activities and Insights -->
    <div class="activity-insights-grid">
      <app-proveedor-activity class="activity-section" [activities]="activityData"></app-proveedor-activity>
      <app-proveedor-insights class="insights-section"
        [travelStats]="insightsTravelStats" 
        [interests]="insightsInterests">
      </app-proveedor-insights>
    </div>
    
    <!-- Section 4: Popular Services -->
    <app-proveedor-services [services]="servicesData"></app-proveedor-services>
  </div>
</app-proveedor-layout>
