<div class="statistics-page">
  <div class="header">
    <div>
      <h1 class="title">{{ 'PROVIDER_STATISTICS.TITLE' | translate }}</h1>
      <p class="subtitle">{{ 'PROVIDER_STATISTICS.SUBTITLE' | translate }}</p>
    </div>
    <div class="period-selector">
      <button 
        class="btn-period" 
        [class.active]="periodoSeleccionado() === 'dia'" 
        (click)="cambiarPeriodo('dia')">Día</button>
      <button 
        class="btn-period" 
        [class.active]="periodoSeleccionado() === 'semana'" 
        (click)="cambiarPeriodo('semana')">Semana</button>
      <button 
        class="btn-period" 
        [class.active]="periodoSeleccionado() === 'mes'" 
        (click)="cambiarPeriodo('mes')">Mes</button>
    </div>
  </div>

  @if (isLoading()) {
    <div class="loading-state">
      <p>{{ 'COMMON.LOADING' | translate }}</p>
    </div>
  } @else {
    <div class="charts-grid">
      <!-- Fila 1: Line Chart y Bar Chart (mitad y mitad) -->
      <div class="chart-wrapper">
        <app-ingresos-line-chart 
          [data]="ingresosPorPeriodo()" 
          [title]="'PROVIDER_STATISTICS.INCOME_CHART.TITLE' | translate"
          [seriesName]="'PROVIDER_STATISTICS.INCOME_CHART.SERIES_NAME' | translate">
        </app-ingresos-line-chart>
      </div>

      <div class="chart-wrapper">
        <app-reservas-bar-chart 
          [data]="reservasRealizadas()" 
          [title]="'PROVIDER_STATISTICS.RESERVATIONS_CHART.TITLE' | translate"
          [seriesName]="'PROVIDER_STATISTICS.RESERVATIONS_CHART.SERIES_NAME' | translate">
        </app-reservas-bar-chart>
      </div>

      <!-- Fila 2: Top Servicios (ocupa 2 columnas si es posible o 1) -->
      <div class="chart-wrapper full-width">
        <app-top-servicios-bar-chart 
          [data]="topServicios()" 
          [title]="'PROVIDER_STATISTICS.TOP_SERVICES_CHART.TITLE' | translate"
          [seriesName]="'PROVIDER_STATISTICS.TOP_SERVICES_CHART.SERIES_NAME' | translate">
        </app-top-servicios-bar-chart>
      </div>

      <!-- Fila 3: Pie Chart y Donut Chart -->
      <div class="chart-wrapper">
        <app-ingresos-pie-chart 
          [data]="distribucionIngresos()" 
          [title]="'PROVIDER_STATISTICS.INCOME_DISTRIBUTION_CHART.TITLE' | translate"
          [seriesName]="'PROVIDER_STATISTICS.INCOME_DISTRIBUTION_CHART.SERIES_NAME' | translate">
        </app-ingresos-pie-chart>
      </div>

      <div class="chart-wrapper">
        <app-reservas-status-donut-chart 
          [data]="reservasPorEstado()" 
          [title]="'PROVIDER_STATISTICS.STATUS_DISTRIBUTION_CHART.TITLE' | translate"
          [seriesName]="'PROVIDER_STATISTICS.STATUS_DISTRIBUTION_CHART.SERIES_NAME' | translate">
        </app-reservas-status-donut-chart>
      </div>
    </div>
  }
</div>
