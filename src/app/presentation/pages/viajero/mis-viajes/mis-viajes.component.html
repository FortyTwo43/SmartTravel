<main id="main-content" class="mis-viajes-page">
  <div class="header-section">
    <h1 class="page-title">Mis Reservas</h1>
    <p class="page-subtitle">Gestiona tus viajes activos y consulta tu historial de aventuras.</p>
  </div>

  <section class="upcoming-section">
    <div class="section-header">
      <span class="section-icon-wrap">
        <lucide-icon name="calendar-clock" aria-hidden="true"></lucide-icon>
      </span>
      <h2 class="section-title">Próximas Reservas</h2>
      <span class="section-badge">{{ data()?.upcoming?.length }} activas</span>
    </div>

    <div class="bookings-grid">
      @for (booking of data()?.upcoming; track booking.id) {
        <app-upcoming-booking-card [booking]="booking"></app-upcoming-booking-card>
      }
    </div>
  </section>

  <section class="history-section">
    <div class="section-header">
      <span class="section-icon-wrap">
        <lucide-icon name="history" aria-hidden="true"></lucide-icon>
      </span>
      <h2 class="section-title">Historial de Viajes</h2>
    </div>

    <div class="history-card">
      @for (booking of data()?.history; track booking.id) {
        <app-history-booking-card [booking]="booking"></app-history-booking-card>
      }
    </div>
  </section>
</main>
