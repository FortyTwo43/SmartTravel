<header class="header-container">
  <div class="header-left">
    <button class="menu-btn" aria-label="Toggle menu" (click)="onMenuClick()">
      <lucide-icon name="Menu" class="icon-md"></lucide-icon>
    </button>
    <div class="header-title">
      Dashboard Administrador
    </div>
  </div>

  <div class="header-actions">
    <div class="status-badge">
      <lucide-icon name="Shield" class="icon-sm"></lucide-icon>
      <span class="status-text">Modo Administrador</span>
    </div>
    
    <button class="notification-btn" type="button" aria-label="Notifications">
      <lucide-icon name="Bell" class="icon-md"></lucide-icon>
      <span class="notification-dot"></span>
    </button>
  </div>
</header>
