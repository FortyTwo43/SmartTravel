<div class="traveler-layout-wrapper">
  @if (isSidebarOpen()) {
    <!-- WCAG 2.1.2 — El backdrop cierra el sidebar con clic Y con teclado (Escape/Enter/Space) -->
    <div
      class="sidebar-backdrop"
      (click)="closeSidebar()"
      (keydown.escape)="closeSidebar()"
      role="button"
      tabindex="-1"
      aria-label="Cerrar menú lateral"
    ></div>
  }

  <!-- WCAG 2.1.2 — El sidebar recibe foco al abrirse (gestionado en el componente) -->
  <app-traveler-sidebar [isOpen]="isSidebarOpen()" (closeSidebar)="closeSidebar()"></app-traveler-sidebar>

  <!-- WCAG 2.1.2 — Cuando el sidebar está abierto en móvil, el contenido principal se
       oculta de la secuencia de foco para evitar que el usuario tabule fuera del sidebar -->
  <main
    class="traveler-layout-container"
    [attr.aria-hidden]="isSidebarOpen() ? 'true' : null"
    [attr.inert]="isSidebarOpen() ? '' : null"
  >
    <!-- Header -->
    <app-traveler-header (toggleSidebar)="toggleSidebar()"></app-traveler-header>

    <!-- Content - Routes rendered here -->
    <div class="traveler-content-area" id="main-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
