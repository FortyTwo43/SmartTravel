<header class="traveler-header">
  <div class="header-content">
    <div class="greeting">
      <h1 class="greeting-title">{{ 'TRAVELER_DASHBOARD.HELLO' | translate }}, {{ userName() }}</h1>
      <p class="greeting-subtitle">{{ 'TRAVELER_DASHBOARD.CURIOSITY' | translate }}</p>
    </div>

    <div class="header-actions">
      <input
        type="search"
        class="search-input"
        placeholder="{{ 'COMMON.SEARCH' | translate }}"
        aria-label="Search destinations"
      />
      <button class="notification-btn" type="button" aria-label="Notifications">
        <span class="notification-icon">🔔</span>
        <span class="notification-badge">3</span>
      </button>
    </div>
  </div>
</header>
