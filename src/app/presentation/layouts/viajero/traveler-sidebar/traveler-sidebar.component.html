<aside class="traveler-sidebar" [class.open]="isOpen()" role="complementary" aria-label="Menú de navegación">
  <div class="sidebar-header">
    <h1 class="sidebar-title">SmartTravel</h1>
    <button class="mobile-back-btn" (click)="closeSidebar.emit()" aria-label="Cerrar menú">
      <span>{{ 'COMMON.BACK' | translate }}</span>
      <lucide-icon name="arrow-right" class="icon-sm" aria-hidden="true"></lucide-icon>
    </button>
  </div>

  <!-- WCAG 2.4.3 — aria-current="page" marca la ruta activa para lectores de pantalla -->
  <nav class="sidebar-nav" aria-label="Navegación principal">
    @for (item of navItems; track item.id) {
      <a
        class="nav-item"
        [routerLink]="[item.route]"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        (click)="closeSidebar.emit()"
      >
        <lucide-icon [name]="item.icon" class="nav-icon" aria-hidden="true"></lucide-icon>
        <span class="nav-label">{{ item.label | translate }}</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <!-- WCAG 4.1.2 — aria-label en lugar de title= (title no es expuesto por todos los AT) -->
    <a
      class="settings-btn nav-item"
      routerLink="/traveler/accessibility"
      routerLinkActive="active"
      (click)="closeSidebar.emit()"
      aria-label="Configuración de accesibilidad"
    >
      <lucide-icon name="Settings" class="nav-icon" aria-hidden="true"></lucide-icon>
      <span class="nav-label">{{ 'COMMON.SETTINGS' | translate }}</span>
    </a>

    <button
      class="logout-btn nav-item"
      (click)="logout()"
      type="button"
      aria-label="Cerrar sesión"
    >
      <lucide-icon name="LogOut" class="nav-icon" aria-hidden="true"></lucide-icon>
      <span class="nav-label">{{ 'COMMON.LOGOUT' | translate }}</span>
    </button>
  </div>

  <div class="sidebar-profile">
    <div class="profile-avatar" aria-hidden="true">
      <span>TV</span>
    </div>
    <div class="profile-info">
      <p class="profile-name">Viajero</p>
      <p class="profile-role">{{ 'TRAVELER_SIDEBAR.TRAVELER' | translate }}</p>
    </div>
  </div>
</aside>
